name: Supabase Keep Alive

on:
  schedule:
    # 매주 월요일과 목요일 00:00 UTC에 실행 (한국 시간 오전 09:00)
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # 수동으로 실행하고 싶을 때 사용

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          # Note: 'audit_reviews' is the table we use in cloud_utils.py
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/audit_reviews?select=*&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -I
